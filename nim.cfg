# macOS: link SDL2 statically via homebrew; link OpenGL framework
@if macosx and not emscripten:
  dynlibOverride = "SDL2"
  passL = "-L/opt/homebrew/lib -lSDL2 -framework OpenGL"
  passC = "-DCIMGUI_USE_OPENGL3 -I/opt/homebrew/include/SDL2"
@end

@if linux and not emscripten:
  passL = "-lGL"
  passC = "-DCIMGUI_USE_OPENGL3"
@end

# Performance: disable threads (we're single-threaded) to avoid TLV overhead,
# and use ARC instead of ORC to eliminate cycle-collector cost.
threads = "off"
mm = "arc"
