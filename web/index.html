<!DOCTYPE html>
<html>
  <head>
    <title>crab</title>

    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
      name="viewport"
    />
    <link rel="stylesheet" type="text/css" href="styles.css" />
  </head>

  <body class="no-select">
    <div id="external">
      <button type="button" class="button" id="open-rom">Open ROM</button>
      <button type="button" class="button" id="open-bios">Custom BIOS</button>
      <button type="button" class="button" id="show-log">Show Log</button>
      <div id="fps"></div>
    </div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <div id="log"></div>

    <div id="controls">
      <div id="lr">
        <div id="l" data-inputs="8">L</div>
        <div id="r" data-inputs="9">R</div>
      </div>

      <div id="main-controls">
        <div id="dpad">
          <div id="upleft" data-inputs="0 2"></div>
          <div id="up" data-inputs="0"></div>
          <div id="upright" data-inputs="0 3"></div>
          <div id="left" data-inputs="2"></div>
          <div id="right" data-inputs="3"></div>
          <div id="downleft" data-inputs="1 2"></div>
          <div id="down" data-inputs="1"></div>
          <div id="downright" data-inputs="1 3"></div>
        </div>

        <div id="ab">
          <div id="a" data-inputs="4">A</div>
          <div id="b" data-inputs="5">B</div>
        </div>
      </div>

      <div id="select-start">
        <div id="select" data-inputs="6">select</div>
        <div id="start" data-inputs="7">start</div>
      </div>
    </div>

    <script src="index.js"></script>
    <script src="em.js"></script>
  </body>
</html>
