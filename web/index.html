<!DOCTYPE html>
<html>
  <head>
    <title>dingbat</title>

    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
      name="viewport"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="dingbat" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="stylesheet" type="text/css" href="styles.css" />
  </head>

  <body class="no-select">
    <div id="external">
      <div id="menu-container">
        <button type="button" class="button" id="menu-btn" title="Menu">&#x2630;</button>
        <div id="menu-dropdown" hidden>
          <button type="button" class="menu-item" id="open-rom">Load ROM</button>
          <button type="button" class="menu-item" id="open-recent">Recent</button>
          <button type="button" class="menu-item" id="open-bios">Select BIOS</button>
          <hr class="menu-sep" />
          <button type="button" class="menu-item" id="load-save">Load Save</button>
          <button type="button" class="menu-item" id="export-save">Export Save</button>
          <hr class="menu-sep" />
          <button type="button" class="menu-item" id="check-update">Check for Updates</button>
          <button type="button" class="menu-item" id="force-update">Force Update</button>
          <hr class="menu-sep" />
          <button type="button" class="menu-item" id="show-log">Toggle Log</button>
        </div>
      </div>
      <div id="playback-controls" class="segmented" hidden>
        <button type="button" class="seg-btn" id="reset" title="Reset">&#x21bb;</button>
        <button type="button" class="seg-btn" id="pause" title="Pause">&#x23f8;</button>
        <button type="button" class="seg-btn" id="fast-forward" title="Fast Forward">&#x276D;&#x276D;</button>
      </div>
      <div id="volume-control" class="segmented">
        <button type="button" class="seg-btn" id="vol-down" title="Volume Down">&minus;</button>
        <input type="text" id="vol-display" class="seg-vol-input" value="100%" readonly />
        <button type="button" class="seg-btn" id="vol-up" title="Volume Up">+</button>
      </div>
      <div id="fps"></div>
    </div>

    <div id="bios-modal" class="modal-overlay">
      <div class="modal">
        <h3>BIOS / Bootrom</h3>
        <div class="modal-row">
          <span>GBA BIOS:</span>
          <span id="gba-bios-status">Not set</span>
          <button type="button" class="button" id="pick-gba-bios">Choose</button>
          <button type="button" class="button" id="remove-gba-bios">Remove</button>
        </div>
        <div class="modal-row">
          <span>GBC Bootrom:</span>
          <span id="gbc-bootrom-status">Not set</span>
          <button type="button" class="button" id="pick-gbc-bootrom">Choose</button>
          <button type="button" class="button" id="remove-gbc-bootrom">Remove</button>
        </div>
        <div class="modal-actions">
          <button type="button" class="button" id="bios-save">Save</button>
          <button type="button" class="button" id="bios-cancel">Cancel</button>
        </div>
      </div>
    </div>

    <div id="recent-modal" class="modal-overlay">
      <div class="modal">
        <h3>Recent ROMs</h3>
        <div id="recent-list"></div>
        <div class="modal-footer">
          <span id="storage-info"></span>
          <button type="button" class="button" id="recent-close">Close</button>
        </div>
      </div>
    </div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <div id="log"></div>

    <div id="controls">
      <div id="lr">
        <div id="l" data-inputs="8">L</div>
        <div id="r" data-inputs="9">R</div>
      </div>

      <div id="main-controls">
        <div id="dpad">
          <div id="upleft" data-inputs="0 2"></div>
          <div id="up" data-inputs="0"></div>
          <div id="upright" data-inputs="0 3"></div>
          <div id="left" data-inputs="2"></div>
          <div id="right" data-inputs="3"></div>
          <div id="downleft" data-inputs="1 2"></div>
          <div id="down" data-inputs="1"></div>
          <div id="downright" data-inputs="1 3"></div>
        </div>

        <div id="ab">
          <div id="a" data-inputs="4">A</div>
          <div id="b" data-inputs="5">B</div>
        </div>
      </div>

      <div id="select-start">
        <div id="select" data-inputs="6">select</div>
        <div id="start" data-inputs="7">start</div>
      </div>
    </div>

    <script src="index.js"></script>
    <script src="em.js"></script>
  </body>
</html>
