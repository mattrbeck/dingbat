<!DOCTYPE html>
<html>
  <head>
    <title>dingbat</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" href="embed.css" />
  </head>
  <body>
    <div id="wrapper">
      <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

      <div id="overlay">
        <div id="controls">
          <button type="button" id="reset" title="Reset">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 1 1 3 6.7"/>
              <polyline points="3 7 3 13 9 13"/>
            </svg>
          </button>
          <button type="button" id="pause" title="Pause">
            <svg id="icon-pause" viewBox="0 0 24 24" width="48" height="48" fill="currentColor">
              <rect x="6" y="4" width="4" height="16"/>
              <rect x="14" y="4" width="4" height="16"/>
            </svg>
            <svg id="icon-play" viewBox="0 0 24 24" width="48" height="48" fill="currentColor" style="display:none">
              <polygon points="6,4 20,12 6,20"/>
            </svg>
          </button>
          <button type="button" id="fast-forward" title="Fast Forward">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
              <polygon points="1,4 13,12 1,20"/>
              <polygon points="11,4 23,12 11,20"/>
            </svg>
          </button>
        </div>

        <div id="volume">
          <button type="button" id="vol-icon" title="Toggle Mute">
            <svg id="icon-muted" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="currentColor"/>
              <line x1="23" y1="9" x2="17" y2="15"/>
              <line x1="17" y1="9" x2="23" y2="15"/>
            </svg>
            <svg id="icon-vol" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="currentColor"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
          </button>
          <div id="vol-track">
            <div id="vol-fill"></div>
            <div id="vol-knob"></div>
          </div>
        </div>
      </div>

      <div id="drop-overlay">Drop ROM file here</div>
    </div>

    <script src="embed.js"></script>
    <script src="em.js"></script>
  </body>
</html>
