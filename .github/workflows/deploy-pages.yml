name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nim
        run: |
          curl https://nim-lang.org/choosenim/init.sh -sSf | sh -s -- -y
          echo "$HOME/.nimble/bin" >> $GITHUB_PATH

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: "4.0.23"

      - name: Install nimble dependencies
        run: nimble install -y sdl2

      - name: Build WASM
        run: nim c -d:emscripten src/dingbat_wasm.nim

      - name: Stamp service worker version
        run: |
          sed -i "s/CACHE_VERSION = \"dev\"/CACHE_VERSION = \"${GITHUB_SHA::7}\"/" web/sw.js
          echo -n "${GITHUB_SHA::7}" > web/version.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
